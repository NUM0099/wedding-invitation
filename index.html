<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Nipun & Nuwanthi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --dark: #2c3e50;
            --bg: #fdfaf6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Abhaya Libre', serif;
            background-color: var(--bg);
            color: var(--dark);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .invitation-card {
            background: white;
            max-width: 500px;
            width: 90%;
            margin: 20px auto;
            padding: 40px 20px;
            text-align: center;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid #eee;
            position: relative;
        }

        /* පින්තූරය සඳහා Style */
        .couple-img {
            width: 100%;
            height: auto;
            max-height: 400px;
            border-radius: 15px;
            object-fit: cover;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: var(--gold);
            margin: 10px 0;
        }

        .guest-welcome {
            margin: 25px 0;
            padding: 20px;
            background: #fff9f0;
            border-radius: 12px;
            border: 1px dashed var(--gold);
        }

        #guest-display-name {
            display: block;
            font-size: 1.8rem;
            font-weight: bold;
            color: #b8962e;
            margin: 8px 0;
        }

        .event-info {
            font-size: 1.3rem;
            line-height: 1.8;
            margin: 20px 0;
        }

        /* Countdown Style */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 25px 0;
        }

        .timer-box {
            background: white;
            border: 1px solid var(--gold);
            padding: 10px;
            min-width: 60px;
            border-radius: 10px;
        }

        .timer-box span {
            display: block;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gold);
        }

        .timer-box p {
            margin: 0;
            font-size: 0.75rem;
            color: #777;
        }

        /* Map Embed Style */
        .map-container {
            margin-top: 30px;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid var(--gold);
            height: 280px;
        }

        .location-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 30px;
            background-color: var(--gold);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }

        .location-btn:hover {
            background-color: #b8962e;
        }
    </style>
</head>
<body>

<div class="invitation-card">
    
    <img src="wedding_photo.jpg" class="couple-img" alt="Nipun & Nuwanthi" onerror="this.src='https://via.placeholder.com/400x300?text=Nipun+%26+Nuwanthi';">

    <h1>Nipun & Nuwanthi</h1>
    
    <div class="guest-welcome">
        <p style="margin:0;">ආදරණීය,</p>
        <span id="guest-display-name">අමුත්තාගේ නම</span>
        <p style="margin:0;">සහ පවුලේ සැමට කරන ගෞරවණීය ඇරයුමයි!</p>
    </div>

    <div class="event-info">
        <p>අපගේ විවාහ මංගල්‍ය උත්සවය<br>
        <b>2026 ජුනි මස 25 වන දින</b><br>
        පෙරවරු 9.30 සිට පැවැත්වේ.</p>
    </div>

    <div class="countdown">
        <div class="timer-box"><span id="d">00</span><p>දින</p></div>
        <div class="timer-box"><span id="h">00</span><p>පැය</p></div>
        <div class="timer-box"><span id="m">00</span><p>විනාඩි</p></div>
        <div class="timer-box"><span id="s">00</span><p>තත්පර</p></div>
    </div>

    <div class="map-container">
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d6256.00863215809!2d80.67904469233791!3d7.278035246900833!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3ae3666008096225%3A0x77df49914278ee6!2sSerendip%20Stone%20Bungalow%20%26%20Hotel!5e1!3m2!1sen!2slk!4v1777142809995!5m2!1sen!2slk" 
            width="100%" 
            height="100%" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>
    
    <a href="https://www.google.com/maps/place/Serendip+Stone+Bungalow+%26+Hotel/@7.2771381,80.6763176,180m/data=!3m1!1e3!4m9!3m8!1s0x3ae3666008096225:0x77df49914278ee6!5m2!4m1!1i2!8m2!3d7.2768195!4d80.6763491!16s%2Fg%2F11cjj08ymh?entry=ttu&g_ep=EgoyMDI2MDQyMi4wIKXMDSoASAFQAw%3D%3D5" target="_blank" class="location-btn">View on Google Maps</a>
    
    <div style="margin-top: 30px; color: #bbb;">✿ See you there! ✿</div>
</div>

<script>
    // URL එකෙන් නම ගෙන පෙන්වීම
    function loadGuestName() {
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('invitees_name');
        if (name) {
            document.getElementById('guest-display-name').innerText = decodeURIComponent(name).replace(/\+/g, ' ');
        }
    }

    // Countdown Timer (Target: 2026.06.25)
    const weddingDate = new Date("June 25, 2026 09:30:00").getTime();

    const timerInterval = setInterval(function() {
        const now = new Date().getTime();
        const timeLeft = weddingDate - now;

        if (timeLeft < 0) {
            clearInterval(timerInterval);
            document.querySelector(".countdown").innerHTML = "<h3>අදයි ඒ සුබ දිනය!</h3>";
            return;
        }

        const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
        const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

        document.getElementById("d").innerText = days.toString().padStart(2, '0');
        document.getElementById("h").innerText = hours.toString().padStart(2, '0');
        document.getElementById("m").innerText = minutes.toString().padStart(2, '0');
        document.getElementById("s").innerText = seconds.toString().padStart(2, '0');
    }, 1000);

    loadGuestName();
</script>

</body>
</html>
